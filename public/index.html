<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrthoRef - Orthopaedic Consultation</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Welcome/Landing Screen -->
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-container">
      <div class="welcome-header">
        <h1 class="logo">Ortho<span>Ref</span></h1>
        <p class="welcome-subtitle">Instant anatomical reference for patient consultation</p>
      </div>

      <button class="cta-button" id="startConsultation">Start Consultation</button>

      <div class="welcome-grid">
        <div class="welcome-section">
          <h3 class="section-title">Recent Conditions</h3>
          <div class="recent-list" id="recentList"></div>
        </div>
        <div class="welcome-section">
          <h3 class="section-title">Quick Access</h3>
          <div class="quick-links">
            <button class="quick-link" data-region="knee">Knee</button>
            <button class="quick-link" data-region="shoulder">Shoulder</button>
            <button class="quick-link" data-region="wrist">Wrist</button>
            <button class="quick-link" data-region="spine">Spine</button>
          </div>
        </div>
      </div>

      <div class="welcome-footer">
        <small>Admin: <a href="/admin">Manage images</a></small>
      </div>
    </div>
  </div>

  <!-- Body Map Selection Screen -->
  <div class="bodymap-screen" id="bodymapScreen" style="display:none">
    <div class="bodymap-container">
      <div class="bodymap-header">
        <button class="back-button" id="backFromBodyMap" title="Back">← Back</button>
        <h2>Select Body Region</h2>
        <div></div>
      </div>

      <div class="bodymap-selector">
        <div class="body-figures">
          <div class="figure-group">
            <button class="body-figure front" id="bodyFront" title="Front view">
              <svg viewBox="0 0 100 200" class="body-svg">
                <!-- Head/Neck -->
                <circle cx="50" cy="25" r="12" class="region" data-region="head-neck"/>
                <!-- Shoulder -->
                <ellipse cx="35" cy="45" rx="8" ry="12" class="region" data-region="shoulder"/>
                <ellipse cx="65" cy="45" rx="8" ry="12" class="region" data-region="shoulder"/>
                <!-- Elbow -->
                <ellipse cx="28" cy="70" rx="6" ry="10" class="region" data-region="elbow"/>
                <ellipse cx="72" cy="70" rx="6" ry="10" class="region" data-region="elbow"/>
                <!-- Wrist/Hand -->
                <ellipse cx="22" cy="95" rx="5" ry="8" class="region" data-region="wrist"/>
                <ellipse cx="78" cy="95" rx="5" ry="8" class="region" data-region="wrist"/>
                <!-- Spine -->
                <rect x="48" y="45" width="4" height="50" class="region" data-region="spine"/>
                <!-- Hip -->
                <ellipse cx="40" cy="120" rx="10" ry="12" class="region" data-region="hip"/>
                <ellipse cx="60" cy="120" rx="10" ry="12" class="region" data-region="hip"/>
                <!-- Knee -->
                <ellipse cx="38" cy="155" rx="8" ry="10" class="region" data-region="knee"/>
                <ellipse cx="62" cy="155" rx="8" ry="10" class="region" data-region="knee"/>
                <!-- Ankle/Foot -->
                <ellipse cx="38" cy="185" rx="7" ry="9" class="region" data-region="ankle"/>
                <ellipse cx="62" cy="185" rx="7" ry="9" class="region" data-region="ankle"/>
              </svg>
              <span>Front</span>
            </button>

            <button class="body-figure back" id="bodyBack" title="Back view">
              <svg viewBox="0 0 100 200" class="body-svg">
                <!-- Head/Neck -->
                <circle cx="50" cy="25" r="12" class="region" data-region="head-neck"/>
                <!-- Shoulder -->
                <ellipse cx="35" cy="45" rx="8" ry="12" class="region" data-region="shoulder"/>
                <ellipse cx="65" cy="45" rx="8" ry="12" class="region" data-region="shoulder"/>
                <!-- Elbow -->
                <ellipse cx="28" cy="70" rx="6" ry="10" class="region" data-region="elbow"/>
                <ellipse cx="72" cy="70" rx="6" ry="10" class="region" data-region="elbow"/>
                <!-- Wrist/Hand -->
                <ellipse cx="22" cy="95" rx="5" ry="8" class="region" data-region="wrist"/>
                <ellipse cx="78" cy="95" rx="5" ry="8" class="region" data-region="wrist"/>
                <!-- Spine -->
                <rect x="48" y="45" width="4" height="50" class="region" data-region="spine"/>
                <!-- Hip -->
                <ellipse cx="40" cy="120" rx="10" ry="12" class="region" data-region="hip"/>
                <ellipse cx="60" cy="120" rx="10" ry="12" class="region" data-region="hip"/>
                <!-- Knee -->
                <ellipse cx="38" cy="155" rx="8" ry="10" class="region" data-region="knee"/>
                <ellipse cx="62" cy="155" rx="8" ry="10" class="region" data-region="knee"/>
                <!-- Ankle/Foot -->
                <ellipse cx="38" cy="185" rx="7" ry="9" class="region" data-region="ankle"/>
                <ellipse cx="62" cy="185" rx="7" ry="9" class="region" data-region="ankle"/>
              </svg>
              <span>Back</span>
            </button>
          </div>
        </div>
      </div>

      <div class="search-fallback">
        <p>Or search directly:</p>
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" class="search-input" id="searchInputFallback" placeholder="Search condition..." autocomplete="off">
        </div>
        <div class="results-grid" id="resultsGridFallback"></div>
      </div>
    </div>
  </div>

  <!-- Condition Selection Screen -->
  <div class="condition-screen" id="conditionScreen" style="display:none">
    <div class="condition-container">
      <div class="condition-header">
        <button class="back-button" id="backFromCondition" title="Back">← Back</button>
        <h2 id="selectedRegionTitle">Select Condition</h2>
        <div></div>
      </div>

      <div class="breadcrumb" id="breadcrumb">
        <span id="breadcrumbRegion"></span>
        <span class="breadcrumb-sep">›</span>
        <span>Condition</span>
      </div>

      <div class="condition-search">
        <input type="text" class="search-input" id="conditionSearchInput" placeholder="Search conditions..." autocomplete="off">
      </div>

      <div class="condition-chips" id="conditionChips"></div>
    </div>
  </div>

  <!-- Image Tray Screen -->
  <div class="tray-screen" id="trayScreen" style="display:none">
    <div class="tray-container">
      <div class="tray-header">
        <button class="back-button" id="backFromTray" title="Back">← Back</button>
        <div>
          <h2 id="trayConditionName">Condition</h2>
          <p id="trayConditionRegion" class="tray-region"></p>
        </div>
        <div></div>
      </div>

      <div class="tray-content">
        <div class="image-tray" id="imageTray"></div>
      </div>

      <div class="empty-state" id="emptyTrayState" style="display:none">
        <p>No images available for this condition.</p>
      </div>
    </div>
  </div>

  <!-- Presentation Overlay - Consultation Surface -->
  <div class="presentation-surface" id="overlay">
    <!-- Top Bar: Minimal chrome with essential info -->
    <header class="presentation-header">
      <div class="presentation-meta">
        <h1 class="presentation-title" id="overlayTitle"></h1>
        <div class="presentation-info">
          <span class="presentation-view" id="overlayViewLabel"></span>
          <span class="presentation-counter" id="imageCounter"></span>
        </div>
      </div>
      <div class="presentation-controls">
        <div class="control-group annotation-controls" id="annotationControls">
          <button class="control-btn" id="annotateToggle" title="Toggle Annotation (A)" data-active="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 19l7-7 3 3-7 7-3-3z"/>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
              <path d="M2 2l7.586 7.586"/>
              <circle cx="11" cy="11" r="2"/>
            </svg>
          </button>
          <button class="control-btn" id="clearAnnotations" title="Clear Annotations (C)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>
        <div class="control-divider"></div>
        <div class="control-group zoom-controls">
          <button class="control-btn" id="zoomOut" title="Zoom Out (-)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
              <path d="M8 11h6"/>
            </svg>
          </button>
          <span class="zoom-level" id="zoomLevel">100%</span>
          <button class="control-btn" id="zoomIn" title="Zoom In (+)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
              <path d="M11 8v6"/>
              <path d="M8 11h6"/>
            </svg>
          </button>
          <button class="control-btn" id="zoomReset" title="Reset Zoom (0)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              <path d="M23 6v4h-4"/>
              <path d="M1 18v-4h4"/>
            </svg>
          </button>
        </div>
        <div class="control-divider"></div>
        <button class="control-btn close-btn" id="overlayClose" title="Close (Esc)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18"/>
            <path d="M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Viewing Area -->
    <main class="presentation-viewport">
      <!-- Navigation: Integrated, not floating -->
      <button class="nav-region nav-prev" id="navPrev" title="Previous (←)">
        <span class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </span>
      </button>

      <div class="image-stage" id="imageContainer">
        <div class="image-frame" id="imageFrame">
          <img id="presentationImage" src="" alt="" draggable="false">
          <canvas class="annotation-layer" id="annotationCanvas"></canvas>
        </div>
      </div>

      <button class="nav-region nav-next" id="navNext" title="Next (→)">
        <span class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </span>
      </button>
    </main>

    <!-- Filmstrip Rail -->
    <footer class="filmstrip-rail" id="filmstripRail">
      <div class="filmstrip-track" id="filmstripTrack"></div>
    </footer>

    <!-- Annotation Mode Indicator -->
    <div class="annotation-indicator" id="annotationIndicator">
      <span class="indicator-dot"></span>
      <span>Annotation Mode</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
