<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OrthoRef - Professional orthopaedic reference tool for surgical consultation">
  <meta name="theme-color" content="#0c0c0e">
  <title>OrthoRef - Orthopaedic Consultation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Welcome/Landing Screen -->
  <main class="welcome-screen" id="welcomeScreen" role="main" aria-label="Welcome to OrthoRef">
    <div class="welcome-container">
      <header class="welcome-header">
        <h1 class="logo">Ortho<span>Ref</span></h1>
        <p class="welcome-subtitle">Professional anatomical reference for patient consultation</p>
      </header>

      <button class="cta-button" id="startConsultation" aria-label="Start a new consultation">
        Start Consultation
      </button>

      <div class="welcome-grid">
        <section class="welcome-section" aria-labelledby="recent-title">
          <h2 class="section-title" id="recent-title">Recent</h2>
          <nav class="recent-list" id="recentList" aria-label="Recently viewed conditions"></nav>
        </section>
        <section class="welcome-section" aria-labelledby="quick-title">
          <h2 class="section-title" id="quick-title">Quick Access</h2>
          <nav class="quick-links" aria-label="Quick access to common body regions">
            <button class="quick-link" data-region="knee" aria-label="View knee conditions">Knee</button>
            <button class="quick-link" data-region="shoulder" aria-label="View shoulder conditions">Shoulder</button>
            <button class="quick-link" data-region="wrist" aria-label="View wrist conditions">Wrist</button>
            <button class="quick-link" data-region="spine" aria-label="View spine conditions">Spine</button>
          </nav>
        </section>
      </div>

      <footer class="welcome-footer">
        <small><a href="/admin" aria-label="Go to admin panel to manage images">Admin Panel</a></small>
      </footer>
    </div>
  </main>

  <!-- Body Map Selection Screen -->
  <main class="bodymap-screen" id="bodymapScreen" style="display:none" role="main" aria-label="Body region selection">
    <div class="bodymap-container">
      <header class="bodymap-header">
        <button class="back-button" id="backFromBodyMap" aria-label="Go back to welcome screen">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M10 12L6 8L10 4"/>
          </svg>
          Back
        </button>
        <h1>Select Body Region</h1>
        <div aria-hidden="true"></div>
      </header>

      <section class="bodymap-selector" aria-label="Interactive body map">
        <div class="body-figures">
          <div class="figure-group">
            <button class="body-figure front" id="bodyFront" aria-label="Front view of body">
              <svg viewBox="0 0 100 200" class="body-svg" role="img" aria-label="Front body diagram with clickable regions">
                <!-- Head/Neck -->
                <circle cx="50" cy="25" r="12" class="region" data-region="head-neck" tabindex="0" role="button" aria-label="Head and neck region"/>
                <!-- Shoulder -->
                <ellipse cx="35" cy="45" rx="8" ry="12" class="region" data-region="shoulder" tabindex="0" role="button" aria-label="Left shoulder"/>
                <ellipse cx="65" cy="45" rx="8" ry="12" class="region" data-region="shoulder" tabindex="0" role="button" aria-label="Right shoulder"/>
                <!-- Elbow -->
                <ellipse cx="28" cy="70" rx="6" ry="10" class="region" data-region="elbow" tabindex="0" role="button" aria-label="Left elbow"/>
                <ellipse cx="72" cy="70" rx="6" ry="10" class="region" data-region="elbow" tabindex="0" role="button" aria-label="Right elbow"/>
                <!-- Wrist/Hand -->
                <ellipse cx="22" cy="95" rx="5" ry="8" class="region" data-region="wrist" tabindex="0" role="button" aria-label="Left wrist"/>
                <ellipse cx="78" cy="95" rx="5" ry="8" class="region" data-region="wrist" tabindex="0" role="button" aria-label="Right wrist"/>
                <!-- Spine -->
                <rect x="48" y="45" width="4" height="50" class="region" data-region="spine" tabindex="0" role="button" aria-label="Spine"/>
                <!-- Hip -->
                <ellipse cx="40" cy="120" rx="10" ry="12" class="region" data-region="hip" tabindex="0" role="button" aria-label="Left hip"/>
                <ellipse cx="60" cy="120" rx="10" ry="12" class="region" data-region="hip" tabindex="0" role="button" aria-label="Right hip"/>
                <!-- Knee -->
                <ellipse cx="38" cy="155" rx="8" ry="10" class="region" data-region="knee" tabindex="0" role="button" aria-label="Left knee"/>
                <ellipse cx="62" cy="155" rx="8" ry="10" class="region" data-region="knee" tabindex="0" role="button" aria-label="Right knee"/>
                <!-- Ankle/Foot -->
                <ellipse cx="38" cy="185" rx="7" ry="9" class="region" data-region="ankle" tabindex="0" role="button" aria-label="Left ankle"/>
                <ellipse cx="62" cy="185" rx="7" ry="9" class="region" data-region="ankle" tabindex="0" role="button" aria-label="Right ankle"/>
              </svg>
              <span>Front</span>
            </button>

            <button class="body-figure back" id="bodyBack" aria-label="Back view of body">
              <svg viewBox="0 0 100 200" class="body-svg" role="img" aria-label="Back body diagram with clickable regions">
                <!-- Head/Neck -->
                <circle cx="50" cy="25" r="12" class="region" data-region="head-neck" tabindex="0" role="button" aria-label="Head and neck region"/>
                <!-- Shoulder -->
                <ellipse cx="35" cy="45" rx="8" ry="12" class="region" data-region="shoulder" tabindex="0" role="button" aria-label="Left shoulder"/>
                <ellipse cx="65" cy="45" rx="8" ry="12" class="region" data-region="shoulder" tabindex="0" role="button" aria-label="Right shoulder"/>
                <!-- Elbow -->
                <ellipse cx="28" cy="70" rx="6" ry="10" class="region" data-region="elbow" tabindex="0" role="button" aria-label="Left elbow"/>
                <ellipse cx="72" cy="70" rx="6" ry="10" class="region" data-region="elbow" tabindex="0" role="button" aria-label="Right elbow"/>
                <!-- Wrist/Hand -->
                <ellipse cx="22" cy="95" rx="5" ry="8" class="region" data-region="wrist" tabindex="0" role="button" aria-label="Left wrist"/>
                <ellipse cx="78" cy="95" rx="5" ry="8" class="region" data-region="wrist" tabindex="0" role="button" aria-label="Right wrist"/>
                <!-- Spine -->
                <rect x="48" y="45" width="4" height="50" class="region" data-region="spine" tabindex="0" role="button" aria-label="Spine"/>
                <!-- Hip -->
                <ellipse cx="40" cy="120" rx="10" ry="12" class="region" data-region="hip" tabindex="0" role="button" aria-label="Left hip"/>
                <ellipse cx="60" cy="120" rx="10" ry="12" class="region" data-region="hip" tabindex="0" role="button" aria-label="Right hip"/>
                <!-- Knee -->
                <ellipse cx="38" cy="155" rx="8" ry="10" class="region" data-region="knee" tabindex="0" role="button" aria-label="Left knee"/>
                <ellipse cx="62" cy="155" rx="8" ry="10" class="region" data-region="knee" tabindex="0" role="button" aria-label="Right knee"/>
                <!-- Ankle/Foot -->
                <ellipse cx="38" cy="185" rx="7" ry="9" class="region" data-region="ankle" tabindex="0" role="button" aria-label="Left ankle"/>
                <ellipse cx="62" cy="185" rx="7" ry="9" class="region" data-region="ankle" tabindex="0" role="button" aria-label="Right ankle"/>
              </svg>
              <span>Back</span>
            </button>
          </div>
        </div>
      </section>

      <section class="search-fallback" aria-label="Search conditions">
        <p>Or search directly:</p>
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" class="search-input" id="searchInputFallback" placeholder="Search condition..." autocomplete="off" aria-label="Search for a condition">
        </div>
        <div class="results-grid" id="resultsGridFallback" role="list" aria-label="Search results"></div>
      </section>
    </div>
  </main>

  <!-- Condition Selection Screen -->
  <main class="condition-screen" id="conditionScreen" style="display:none" role="main" aria-label="Condition selection">
    <div class="condition-container">
      <header class="condition-header">
        <button class="back-button" id="backFromCondition" aria-label="Go back to body map">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M10 12L6 8L10 4"/>
          </svg>
          Back
        </button>
        <h1 id="selectedRegionTitle">Select Condition</h1>
        <div aria-hidden="true"></div>
      </header>

      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb navigation">
        <span id="breadcrumbRegion"></span>
        <span class="breadcrumb-sep" aria-hidden="true">/</span>
        <span aria-current="page">Conditions</span>
      </nav>

      <div class="condition-search">
        <input type="search" class="search-input" id="conditionSearchInput" placeholder="Filter conditions..." autocomplete="off" aria-label="Filter conditions list">
      </div>

      <section class="condition-chips" id="conditionChips" role="list" aria-label="Available conditions"></section>
    </div>
  </main>

  <!-- Image Tray Screen -->
  <main class="tray-screen" id="trayScreen" style="display:none" role="main" aria-label="Image gallery">
    <div class="tray-container">
      <header class="tray-header">
        <button class="back-button" id="backFromTray" aria-label="Go back to body map">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M10 12L6 8L10 4"/>
          </svg>
          Back
        </button>
        <div>
          <h1 id="trayConditionName">Condition</h1>
          <p id="trayConditionRegion" class="tray-region"></p>
        </div>
        <div aria-hidden="true"></div>
      </header>

      <section class="tray-content" aria-label="Reference images">
        <div class="image-tray" id="imageTray" role="list" aria-label="Click an image to view full screen"></div>
      </section>

      <div class="empty-state" id="emptyTrayState" style="display:none" role="status" aria-live="polite">
        <p>No images available for this condition.</p>
      </div>
    </div>
  </main>

  <!-- Presentation Overlay -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
    <header class="overlay-header">
      <div>
        <span class="overlay-title" id="overlayTitle"></span>
        <span class="overlay-view-label" id="overlayViewLabel"></span>
      </div>
      <button class="overlay-close" id="overlayClose" aria-label="Close presentation (Escape)">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M15 5L5 15M5 5l10 10"/>
        </svg>
      </button>
    </header>

    <button class="nav-arrow prev" id="navPrev" aria-label="Previous image (Left arrow)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M15 18L9 12L15 6"/>
      </svg>
    </button>
    <button class="nav-arrow next" id="navNext" aria-label="Next image (Right arrow)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M9 6L15 12L9 18"/>
      </svg>
    </button>

    <div class="image-container" id="imageContainer">
      <img id="presentationImage" src="" alt="Anatomical reference image">
      <canvas class="annotation-canvas" id="annotationCanvas" aria-label="Annotation canvas - draw to annotate, double-click to clear"></canvas>
      <div class="annotation-hint" id="annotationHint" aria-live="polite">Draw to annotate · Double-click to clear</div>
    </div>

    <nav class="dot-indicators" id="dotIndicators" aria-label="Image navigation"></nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
